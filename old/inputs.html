<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Form inputs</title>
</head>
<body>
  <form class="" action="index.html" method="post">
  <!-- input type button
  value -> text in the button
  disabled -> disabled button
  accesskey -> tecla de acceso directo
  events click
  attributes -> checked, indeterminate, value
  -->
    <input type="button" name="btn" value="botón" accesskey="b"><br>
  <!-- input type checkbox
  value -> value submitted
  disabled -> disabled button
  accesskey -> tecla de acceso directo
  events -> change, input
  checked -> prechecked checkbox
  -->
    <label for="checkbox">checkbox</label>
    <input type="checkbox" name="checkbox" value="checkbox"><br>
    <!-- input type checkbox
    value -> value submitted
    disabled -> disabled button
    accesskey -> tecla de acceso directo
    events -> change, input
    checked -> prechecked checkbox
    -->
    <label for="color">colorpicker</label>
    <input type="color" name="color" value="color"><br>
    <label for="date">date</label>
    <input type="date" name="date" value=""><br>
    <label for="datetime-local">datetime-local</label>
    <input type="datetime-local" name="" value=""><br>
    <label for="email">email</label>
    <input type="email" name="email" value=""><br>
    <label for="file">file</label>
    <input type="file" name="file" value=""><br>
    <label for="hidden">hidden</label>
    <input type="hidden" name="hidden" value=""><br>
    <label for="image">image</label>
    <input type="image" name="image" value=""><br>
    <input type="month" name="" value=""><br>
    <input type="number" name="" value=""><br>
    <input type="password" name="" value=""><br>
    <input type="radio" name="" value=""><br>
    <input type="range" name="" value=""><br>
    <input type="reset" name="" value=""><br>
    <input type="search" name="" value=""><br>
    <input type="submit" name="" value=""><br>
    <input type="tel" name="" value=""><br>
    <input type="text" name="" value=""><br>
    <input type="time" name="" value=""><br>
    <input type="url" name="" value=""><br>
    <input type="week" name="" value=""><br>

  </form>
</body>
</html>
